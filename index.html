<!DOCTYPE html> 
<html lang="uk">
<head>
<meta name="Електричні пили" content="index, follow">
<meta name="author" content="Inst asortiments">
<meta name="Електричні тримери" content="index, follow">
<meta name="description" content="Inst Asortiments — магазин інстументу. Швидкий заказ через Telegram.">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inst asortiments - магазин інструментів</title>
<style>
body {margin:0; font-family:Arial; background:#000; color:#90ee90; position:relative; min-height:100vh; overflow-x:hidden;}
body::before {content:"Inst asortiments"; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:200px; color:rgba(144,238,144,0.05); font-weight:bold; white-space:nowrap; z-index:0; pointer-events:none;}
header {background:#111; padding:20px; text-align:center; font-size:26px; position:relative; z-index:2;}
.container {padding:20px; max-width:1300px; margin:auto; position:relative; z-index:2;}
.search-box {text-align:center; margin-bottom:15px; color:#90ee90;}
.search-box input {padding:11px; width:275px; border:none; color:#de9210;}
.products {display:grid; grid-template-columns:repeat(3,1fr); gap:22px; position:relative; z-index:2;}
.product {background:#111; padding:10px; border:5px solid #90ee90; text-align:center;}
.product img {width:100%; aspect-ratio:1/1; object-fit:contain; cursor:pointer; border: 3xp solid #32cd32; border: 12xp;}
button {padding:8px 25px; border:none; background:#90ee90; font-weight:bold; cursor:pointer; margin-top:10px;}
button:hover{background:#6edc6e;}
.edit-btn{background:orange; color:black;}
.modal{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:3;}
.modal-content{background:#111; padding:50px; border:1px solid #90ee90; width:90%; max-width:400px; text-align:center;}
.modal-content img{width:100%; aspect-ratio:1/1; object-fit:contain;  border: 3xp solid red; padding: 12xp; background: #111;}
input, textarea, select{width:100%; padding:8px; margin:5px 0; border:none;}
.leaf{position:fixed; top:-50px; font-size:24px; color:#32CD32; z-index:1; pointer-events:none; user-select:none; animation-name:fall; animation-timing-function:linear;}
@keyframes fall{0%{transform:translateY(0) rotate(0deg); opacity:1;}100%{transform:translateY(110vh) rotate(360deg); opacity:0;}}
@media(max-width:900px){.products{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.products{grid-template-columns:1fr;}.search-box input{width:100%;} body::before{font-size:80px;}}
</style>
</head>
<body>
<header>🛒 Inst asortiments</header>
<div class="container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Пошук товару..." onkeyup="handleSearch()">
    <select id="categoryFilter" onchange="filterCategory()"><option value="">Всі категорії</option></select>
  </div>
  <div style="text-align:center;">
    <button id="addProductBtn" style="display:none;" onclick="openAddModal()">Додати товар</button>
    <button id="manageCategoriesBtn" style="display:none;" onclick="openCategoryModal()">Категорії</button>
  </div>
  <div class="products" id="products"></div>
</div>

<!-- Модали -->
<div class="modal" id="viewModal">
  <div class="modal-content" style="position:relative;">
    <!-- Кнопка влево -->
    <button onclick="prevImage()" style="position:absolute;left:-40px;top:45%;font-size:25px; background:none; border:none; color:#90ee90; cursor:pointer;">◀</button>

    <!-- Картинка -->
    <img id="modalImg" onclick="openFullscreen(this.src)" style="width:100%; aspect-ratio:1/1; object-fit:contain; cursor:pointer;">

    <!-- Кнопка вправо -->
    <button onclick="nextImage()" style="position:absolute;right:-40px;top:45%;font-size:25px; background:none; border:none; color:#90ee90; cursor:pointer;">▶</button>

    <!-- Текстовая информация -->
    <h3 id="modalTitle"></h3>
    <p id="modalPrice"></p>
    <p id="modalDesc"></p>
    <p id="modalCategory"></p>

    <button onclick="closeModal()">Назад</button>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h3 id="editTitleText">Додати товар</h3>
    <input type="text" id="editTitle" placeholder="Назва">
    <input type="number" id="editPrice" placeholder="Ціна">
    <div id="imageUploadContainer" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">
  <!-- Тут будут превью загруженных фото -->
  <div id="addImageBtn" style="width:60px; height:60px; border:2px dashed #90ee90; display:flex; justify-content:center; align-items:center; cursor:pointer; font-size:30px; color:#90ee90;">+</div>
</div>
<input type="file" id="editImageFile" accept="image/*" style="display:none;" multiple>
    <textarea id="editDesc" placeholder="Опис"></textarea>
    <select id="editCategory"></select>
    <button onclick="saveProduct()">Зберегти</button>
    <button onclick="closeEditModal()">Скасувати</button>
    <button id="deleteBtn" onclick="deleteProduct()" style="background:red;color:white;display:none;margin-top:5px;">Видалити</button>
  </div>
</div>

<div class="modal" id="categoryModal">
  <div class="modal-content">
    <h3>Категорії</h3>
    <div id="categoryList"></div>
    <input type="text" id="newCategory" placeholder="Нова категорія">
    <button onclick="addCategory()">Додати</button>
    <button onclick="closeCategoryModal()">Скасувати</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// Firebase конфігурація
const firebaseConfig = {
  apiKey: "AIzaSyCPEYu_S1qn9dwCkh22QzyX4-hB4_ecM0A",
  authDomain: "vesinya-pratsya-shop.firebaseapp.com",
  databaseURL: "https://vesinya-pratsya-shop-default-rtdb.firebaseio.com",
  projectId: "vesinya-pratsya-shop",
  storageBucket: "vesinya-pratsya-shop.firebasestorage.app",
  messagingSenderId: "352467558248",
  appId: "1:352467558248:web:fd2c80d6be6d837cff80dd",
  measurementId: "G-NMM6FYEYT8"
};

// Ініціалізація Firebase
firebase.initializeApp(firebaseConfig);
firebase.analytics();
const db = firebase.database();
const storage = firebase.storage();

// Падаюче листя
function createLeaf(){
  const leaf=document.createElement('div');
  leaf.className='leaf';
  leaf.style.left=Math.random()*window.innerWidth+'px';
  leaf.style.fontSize=12+Math.random()*24+'px';
  leaf.style.animationDuration=5+Math.random()*5+'s';
  leaf.innerHTML='🍃';
  document.body.appendChild(leaf);
  setTimeout(()=>leaf.remove(),10000);
}
setInterval(createLeaf,500);

// Магазин
let adminMode=false;
let editingId=null;
let products = [];
let categories = [];

// Слухаємо Firebase
db.ref('products').on('value', snapshot => {
  products = snapshot.val() || [];
  renderProducts();
});
db.ref('categories').on('value', snapshot => {
  categories = snapshot.val() || [];
  populateCategorySelects();
});

function saveToDatabase(){
  db.ref('products').set(products);
  db.ref('categories').set(categories);
}

// Категорії
function populateCategorySelects(){
  const editCat=document.getElementById("editCategory");
  const filterCat=document.getElementById("categoryFilter");
  editCat.innerHTML="<option value=''>Без категорії</option>";
  filterCat.innerHTML="<option value=''>Всі категорії</option>";
  categories.forEach(cat=>{
    editCat.innerHTML+=`<option value="${cat}">${cat}</option>`;
    filterCat.innerHTML+=`<option value="${cat}">${cat}</option>`;
  });
  populateCategoryList();
}

function renderProducts(list = products){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    // Выбираем первое фото, если их несколько
    const displayImage = Array.isArray(p.image) ? p.image[0] : p.image;

    container.innerHTML += `
      <div class="product">
        <img src="${displayImage}" onclick="openViewModal(${p.id})">
        <h4>${p.title}</h4>
        <p>${p.price} грн</p>
        <p>${p.category || ""}</p>
        ${adminMode ? `<button class="edit-btn" onclick="openEditModal(${p.id})">Редагувати</button>` : ""}
        <button onclick="orderProduct('${encodeURIComponent(p.title)}', ${p.price})">Замовити</button>
      </div>
    `;
  });
}

function orderProduct(title,price){
  const url=`https://t.me/Fushan90?text=${encodeURIComponent(`Хочу замовити ${decodeURIComponent(title)} за ${price} грн`)}`;
  window.open(url,"_blank");
}

function handleSearch(){
  let value=document.getElementById("searchInput").value.toLowerCase();
  if(value==="0990"){
    adminMode=true;
    document.getElementById("addProductBtn").style.display="inline-block";
    document.getElementById("manageCategoriesBtn").style.display="inline-block";
    renderProducts();
    return;
  }
  adminMode=false;
  document.getElementById("addProductBtn").style.display="none";
  document.getElementById("manageCategoriesBtn").style.display="none";
  let filtered=products.filter(p=>p.title.toLowerCase().includes(value));
  renderProducts(filtered);
}

function filterCategory(){
  const cat=document.getElementById("categoryFilter").value;
  if(!cat){renderProducts(); return;}
  renderProducts(products.filter(p=>p.category===cat));
}

// Модали
function openViewModal(id){let p=products.find(x=>x.id===id);document.getElementById("modalImg").src=p.image;document.getElementById("modalTitle").innerText=p.title;document.getElementById("modalPrice").innerText=p.price+" грн";document.getElementById("modalDesc").innerText=p.desc;document.getElementById("modalCategory").innerText=p.category?"Категорія: "+p.category:"";document.getElementById("viewModal").style.display="flex";}
function closeModal(){document.getElementById("viewModal").style.display="none";}
function openAddModal(){editingId=null;document.getElementById("editTitleText").innerText="Додати товар";document.getElementById("editTitle").value="";document.getElementById("editPrice").value="";document.getElementById("editImageFile").value="";document.getElementById("editDesc").value="";document.getElementById("editCategory").value="";document.getElementById("deleteBtn").style.display="none";document.getElementById("editModal").style.display="flex";}
function openEditModal(id){let p=products.find(x=>x.id===id);editingId=id;document.getElementById("editTitleText").innerText="Редагувати товар";document.getElementById("editTitle").value=p.title;document.getElementById("editPrice").value=p.price;document.getElementById("editDesc").value=p.desc;document.getElementById("editCategory").value=p.category||"";document.getElementById("editImageFile").value="";document.getElementById("deleteBtn").style.display="block";document.getElementById("editModal").style.display="flex";}
function closeEditModal(){document.getElementById("editModal").style.display="none";}
function saveProduct(){let title=document.getElementById("editTitle").value;let price=document.getElementById("editPrice").value;let desc=document.getElementById("editDesc").value;let category=document.getElementById("editCategory").value;let fileInput=document.getElementById("editImageFile");if(!title||!price||!desc)return alert("Заповніть всі поля");if(fileInput.files && fileInput.files[0]){let reader=new FileReader();reader.onload=function(e){saveProductData(title,price,desc,category,e.target.result);};reader.readAsDataURL(fileInput.files[0]);}else{let existingImage=null;if(editingId){existingImage=products.find(x=>x.id===editingId).image;}saveProductData(title,price,desc,category,existingImage);}}
function saveProductData(title,price,desc,category,image){if(editingId){let p=products.find(x=>x.id===editingId);p.title=title;p.price=price;p.desc=desc;p.category=category;p.image=image;}else{products.push({id:Date.now(),title,price,desc,image,category});}saveToDatabase();closeEditModal();renderProducts();}
function deleteProduct(){if(editingId){if(confirm("Ви впевнені, що хочете видалити цей товар?")){products=products.filter(p=>p.id!==editingId);saveToDatabase();renderProducts();closeEditModal();}}}

// Категорії
function openCategoryModal(){document.getElementById("categoryModal").style.display="flex";}
function closeCategoryModal(){document.getElementById("categoryModal").style.display="none";}
function populateCategoryList(){let list=document.getElementById("categoryList");list.innerHTML="";categories.forEach(cat=>{list.innerHTML+=`<div>${cat} <button onclick="removeCategory('${cat}')">Видалити</button></div>`;});}
function addCategory(){let cat=document.getElementById("newCategory").value.trim();if(!cat)return;if(!categories.includes(cat))categories.push(cat);document.getElementById("newCategory").value="";saveToDatabase();}
function removeCategory(cat){if(confirm(`Видалити категорію "${cat}"? Всі товари залишаться без категорії.`)){categories=categories.filter(c=>c!==cat);products.forEach(p=>{if(p.category===cat)p.category="";});saveToDatabase();}}

populateCategorySelects();
renderProducts();

// Массив временных фото для редактирования
let tempImages = [];

// renderProducts() — рендер карточек товаров
function renderProducts(list = products){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    // Показываем первое фото
    const displayImage = Array.isArray(p.image) ? p.image[0] : p.image;

    container.innerHTML += `
      <div class="product">
        <img src="${displayImage}" onclick="openViewModal(${p.id})">
        <h4>${p.title}</h4>
        <p>${p.price} грн</p>
        <p>${p.category || ""}</p>
        ${adminMode ? `<button class="edit-btn" onclick="openEditModal(${p.id})">Редагувати</button>` : ""}
        <button onclick="orderProduct('${encodeURIComponent(p.title)}', ${p.price})">Замовити</button>
      </div>
    `;
  });
}

// Открытие модалки просмотра с листанием фото
let currentImages = [];
let currentIndex = 0;

function openViewModal(id){
  let p = products.find(x => x.id === id);
  currentImages = Array.isArray(p.image) ? p.image : [p.image];
  currentIndex = 0;

  document.getElementById("modalImg").src = currentImages[currentIndex];
  document.getElementById("modalTitle").innerText = p.title;
  document.getElementById("modalPrice").innerText = p.price + " грн";
  document.getElementById("modalDesc").innerText = p.desc;
  document.getElementById("modalCategory").innerText = p.category ? "Категорія: " + p.category : "";

  document.getElementById("viewModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("viewModal").style.display = "none";
}

function nextImage(){
  if(currentImages.length < 2) return;
  currentIndex++;
  if(currentIndex >= currentImages.length) currentIndex = 0;
  document.getElementById("modalImg").src = currentImages[currentIndex];
}

function prevImage(){
  if(currentImages.length < 2) return;
  currentIndex--;
  if(currentIndex < 0) currentIndex = currentImages.length - 1;
  document.getElementById("modalImg").src = currentImages[currentIndex];
}

// Работа с фото в форме редактирования / добавления
const addImageBtn = document.getElementById("addImageBtn");
const fileInput = document.getElementById("editImageFile");
const container = document.getElementById("imageUploadContainer");

addImageBtn.onclick = () => fileInput.click();

fileInput.onchange = () => {
  const files = Array.from(fileInput.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      tempImages.push(e.target.result);
      renderTempImages();
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = "";
}

// Отрисовка превью фото
function renderTempImages(){
  container.querySelectorAll(".tempImg").forEach(el => el.remove());

  tempImages.forEach((src, index) => {
    const div = document.createElement("div");
    div.className = "tempImg";
    div.style.position = "relative";
    div.style.width = "60px";
    div.style.height = "60px";
    div.style.border = "1px solid #90ee90";
    div.style.backgroundImage = `url(${src})`;
    div.style.backgroundSize = "cover";
    div.style.backgroundPosition = "center";
    div.style.cursor = "pointer";

    const del = document.createElement("div");
    del.innerText = "×";
    del.style.position = "absolute";
    del.style.top = "0";
    del.style.right = "0";
    del.style.background = "red";
    del.style.color = "white";
    del.style.width = "18px";
    del.style.height = "18px";
    del.style.fontSize = "14px";
    del.style.display = "flex";
    del.style.justifyContent = "center";
    del.style.alignItems = "center";
    del.style.cursor = "pointer";
    del.onclick = (e) => {
      e.stopPropagation();
      tempImages.splice(index, 1);
      renderTempImages();
    };
    div.appendChild(del);
    container.insertBefore(div, addImageBtn);
  });
}

// Открытие модалки "добавить товар"
function openAddModal(){
  editingId=null;
  document.getElementById("editTitleText").innerText="Додати товар";
  document.getElementById("editTitle").value="";
  document.getElementById("editPrice").value="";
  document.getElementById("editDesc").value="";
  document.getElementById("editCategory").value="";
  tempImages = [];
  renderTempImages();
  document.getElementById("deleteBtn").style.display="none";
  document.getElementById("editModal").style.display="flex";
}

// Открытие модалки "редактировать товар"
function openEditModal(id){
  let p = products.find(x=>x.id===id);
  editingId=id;
  document.getElementById("editTitleText").innerText="Редагувати товар";
  document.getElementById("editTitle").value=p.title;
  document.getElementById("editPrice").value=p.price;
  document.getElementById("editDesc").value=p.desc;
  document.getElementById("editCategory").value=p.category||"";
  tempImages = Array.isArray(p.image) ? [...p.image] : (p.image ? [p.image] : []);
  renderTempImages();
  document.getElementById("deleteBtn").style.display="block";
  document.getElementById("editModal").style.display="flex";
}

// Сохранение товара
function saveProduct(){
  let title=document.getElementById("editTitle").value;
  let price=document.getElementById("editPrice").value;
  let desc=document.getElementById("editDesc").value;
  let category=document.getElementById("editCategory").value;
  if(!title||!price||!desc)return alert("Заповніть всі поля");

  let images = tempImages.length > 0 ? [...tempImages] : (editingId ? products.find(x=>x.id===editingId).image : []);

  saveProductData(title, price, desc, category, images);
}

// saveProductData с массивом изображений
function saveProductData(title, price, desc, category, images){
  if(editingId){
    let p = products.find(x => x.id === editingId);
    p.title = title;
    p.price = price;
    p.desc = desc;
    p.category = category;
    p.image = Array.isArray(images) ? images : [images];
  } else {
    products.push({
      id: Date.now(),
      title,
      price,
      desc,
      category,
      image: Array.isArray(images) ? images : [images]
    });
  }
  saveToDatabase();
  closeEditModal();
  renderProducts();
}

</script>

<div id="fullscreenViewer" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:9999;
">

<img id="fullscreenImg" style="
max-width:95%;
max-height:95%;
object-fit:contain;
touch-action:none;
cursor:zoom-in;
">

<button onclick="closeFullscreen()" style="
position:absolute;
top:20px;
right:20px;
font-size:35px;
background:none;
border:none;
color:white;
cursor:pointer;
">
✕
</button>

</div>

<script>

  let scale = 1;
let posX = 0;
let posY = 0;

let startX = 0;
let startY = 0;

let startDistance = 0;
let startScale = 1;

const img = document.getElementById("fullscreenImg");

function openFullscreen(src){
  img.src = src;

  scale = 1;
  posX = 0;
  posY = 0;

  updateTransform();

  document.getElementById("fullscreenViewer").style.display = "flex";
}

function closeFullscreen(){
  document.getElementById("fullscreenViewer").style.display = "none";
}

function updateTransform(){
  img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function getDistance(touches){
  return Math.sqrt(
    Math.pow(touches[0].clientX - touches[1].clientX,2) +
    Math.pow(touches[0].clientY - touches[1].clientY,2)
  );
}

img.addEventListener("touchstart", function(e){

  if(e.touches.length === 1){
    startX = e.touches[0].clientX - posX;
    startY = e.touches[0].clientY - posY;
  }

  if(e.touches.length === 2){
    startDistance = getDistance(e.touches);
    startScale = scale;
  }

});

img.addEventListener("touchmove", function(e){

  if(e.touches.length === 1){

  if(scale > 1){

    posX = e.touches[0].clientX - startX;
posY = e.touches[0].clientY - startY;

// ограничение движения
let maxMove = (scale - 1) * 200;

posX = Math.max(-maxMove, Math.min(maxMove, posX));
posY = Math.max(-maxMove, Math.min(maxMove, posY));

updateTransform();

  }

}

  if(e.touches.length === 2){

    let newDistance = getDistance(e.touches);

    scale = startScale * (newDistance / startDistance);

scale = Math.min(Math.max(scale,1),5);

if(scale === 1){
  posX = 0;
  posY = 0;
}

updateTransform();

  }

});

img.addEventListener("touchend", function(){

});
img.addEventListener("touchend", function(){

});


// ===== ЗАГРУЗКА ФОТО В FIREBASE STORAGE =====
async function uploadImagesToFirebase(files){

  const urls = [];

  for(const file of files){

    const fileName = Date.now() + "_" + file.name;

    const storageRef = storage.ref("products/" + fileName);

    await storageRef.put(file);

    const url = await storageRef.getDownloadURL();

    urls.push(url);

  }

  return urls;
}

</script>
</body>
</html>
